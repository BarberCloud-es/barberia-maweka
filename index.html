<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>El Maweka – Barbería Élite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#c9a84c;--gold2:#a8843c;--bg:#0d0b08;--bg2:#111009;--bg3:#1a1510;--bg4:#252015;--border:#252015;--text:#e8d5a3;--muted:#666;--red:#e74c3c;--green:#27ae60;--orange:#e67e22}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Lato',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
header{background:linear-gradient(160deg,#0f0d0a,#1c1710);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:300;box-shadow:0 4px 24px #00000077}
.hdr{max-width:1000px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:70px}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none}
.logo-icon{font-size:32px}
.logo-name{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
main{max-width:1000px;margin:0 auto;padding:25px 20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:15px;padding:25px;max-width:650px;margin:0 auto;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ct{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);margin-bottom:20px;text-align:center}
.nbtn{background:transparent;border:1px solid #3a2e1e;color:var(--muted);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.nbtn.on{background:var(--gold);border-color:var(--gold);color:#0d0b08}
.btn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#0d0b08;padding:14px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
.btn:disabled{opacity:0.3}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px}
.stat-card{background:var(--bg3);padding:15px;border-radius:10px;border-left:4px solid var(--gold);text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cd{text-align:center;padding:12px 5px;border-radius:8px;font-size:14px;cursor:pointer;background:var(--bg3);border:1px solid var(--border)}
.cd.sel{background:var(--gold);color:#000;font-weight:700}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px}
.sl{padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-weight:700;text-align:center}
.sl:disabled{opacity:0.1;text-decoration:line-through}
.apt-card{background:var(--bg3);border:1px solid var(--border);padding:15px;border-radius:12px;margin-bottom:12px}
.apt-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-sm{padding:8px 12px;font-size:11px;border-radius:6px;border:none;cursor:pointer;font-weight:700}
.btn-wa{background:#25D366;color:white;text-decoration:none;display:inline-flex;align-items:center}
.btn-tel{background:var(--orange);color:white;text-decoration:none}
input, select, textarea {width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);color:#fff;border-radius:8px;margin-bottom:10px}
#loading{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:none;align-items:center;justify-content:center;color:var(--gold);font-weight:700}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold);padding:12px 25px;border-radius:30px;z-index:1000;display:none;color:white}
</style>
</head>
<body>

<div id="loading">Cargando datos...</div>
<div id="toast"></div>

<header>
  <div class="hdr">
    <div class="logo"><span class="logo-icon">💈</span><span class="logo-name">El Maweka</span></div>
    <div class="hdr-right">
      <button class="nbtn on" id="btn-client" onclick="switchView('client')">Reservar</button>
      <button class="nbtn" id="btn-admin" onclick="switchView('admin')">Panel Admin</button>
    </div>
  </div>
</header>

<main id="app"></main>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUlscTh2ymVd_-ga8WhN1iY9pEr1u3e1Lz61oLpwbjK8qR9g2e0N3NEbBmiAzo8q9kPA/exec";
const DAYS = ["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
let DB = { appointments:[], services:[], barbers:[], config:{} };
let VIEW = "client";
let ADMIN_AUTH = false;
let WZ = { step:1, date:null, slot:null, barber:null, svc:null, name:"", phone:"", email:"", notes:"" };

async function api(action, payload={}) {
    const res = await fetch(`${SCRIPT_URL}?action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`);
    const json = await res.json();
    if(!json.ok) throw new Error(json.error);
    return json.data;
}

async function loadData() {
    document.getElementById("loading").style.display = "flex";
    try { DB = await api("getAll"); } catch(e) { console.error(e); }
    document.getElementById("loading").style.display = "none";
}

function showToast(m) {
    const t = document.getElementById("toast");
    t.textContent = m; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3000);
}

// ACTUALIZACIÓN EN TIEMPO REAL (Punto 8)
setInterval(async () => {
    if(VIEW === "admin" && ADMIN_AUTH) {
        const fresh = await api("getAll");
        DB.appointments = fresh.appointments;
        render();
    }
}, 15000);

function switchView(v) {
    VIEW = v;
    document.getElementById("btn-client").classList.toggle("on", v==="client");
    document.getElementById("btn-admin").classList.toggle("on", v==="admin");
    render();
}

async function render() {
    const app = document.getElementById("app");
    app.innerHTML = "";
    if(VIEW === "client") renderClient(app);
    else renderAdmin(app);
}

function renderClient(app) {
    const card = document.createElement("div"); card.className = "card";
    
    if(WZ.step === 1) {
        card.innerHTML = `<h2 class="ct">Selecciona Fecha</h2>`;
        const grid = document.createElement("div"); grid.className = "cal-grid";
        const now = new Date();
        for(let i=0; i<14; i++) {
            const d = new Date(); d.setDate(now.getDate() + i);
            const iso = d.toISOString().split('T')[0];
            const el = document.createElement("div"); el.className = `cd ${WZ.date === iso ? 'sel' : ''}`;
            el.innerHTML = `<div>${DAYS[d.getDay()]}</div><b>${d.getDate()}</b>`;
            el.onclick = () => { WZ.date = iso; WZ.step = 2; render(); };
            grid.appendChild(el);
        }
        card.appendChild(grid);
    } 
    else if(WZ.step === 2) {
        card.innerHTML = `<button class="nbtn" onclick="WZ.step=1;render()">← Volver</button><h2 class="ct">Hora para el ${WZ.date}</h2>`;
        const grid = document.createElement("div"); grid.className = "slots";
        const slots = getSlots(WZ.date);
        slots.forEach(s => {
            const btn = document.createElement("button"); btn.className = "sl";
            btn.textContent = s.time; btn.disabled = s.taken;
            btn.onclick = () => { WZ.slot = s.time; WZ.step = 3; render(); };
            grid.appendChild(btn);
        });
        card.appendChild(grid);
    }
    else if(WZ.step === 3) {
        card.innerHTML = `<h2 class="ct">Datos de Reserva</h2>
            <input type="text" id="w-name" placeholder="Nombre Completo *" value="${WZ.name}">
            <input type="tel" id="w-phone" placeholder="WhatsApp (ej: 34600000000) *" value="${WZ.phone}">
            <input type="email" id="w-email" placeholder="Correo Electrónico *" value="${WZ.email}">
            <select id="w-svc">${DB.services.map(s => `<option value="${s.id}">${s.name} (${s.price}${s.currency})</option>`)}</select>
            <select id="w-barber">${DB.barbers.map(b => `<option value="${b.name}">${b.name}</option>`)}</select>
            <textarea id="w-notes" placeholder="Notas adicionales..."></textarea>
            <button class="btn" onclick="confirmBooking()">Confirmar Cita ✓</button>`;
    }
    else if(WZ.step === 4) {
        card.innerHTML = `<div style="text-align:center"><h2 class="ct">¡Todo listo!</h2><p>Tu cita ha sido confirmada. Te enviamos un email con los detalles.</p><br><button class="btn" onclick="location.reload()">Volver al Inicio</button></div>`;
    }
    app.appendChild(card);
}

function getSlots(dateStr) {
    const slots = []; const now = new Date();
    const isToday = dateStr === now.toISOString().split('T')[0];
    const currentMin = (now.getHours() * 60) + now.getMinutes();
    for(let h=9; h<20; h++) {
        for(let m of ["00","30"]) {
            const time = `${String(h).padStart(2,'0')}:${m}`;
            const slotMin = (h * 60) + parseInt(m);
            let taken = DB.appointments.some(a => a.date === dateStr && a.time === time && a.status !== 'cancelada');
            if(isToday && slotMin <= currentMin + 45) taken = true; // PUNTO 1: Bloqueo horas pasadas
            slots.push({ time, taken });
        }
    }
    return slots;
}

async function confirmBooking() {
    const n = document.getElementById("w-name").value;
    const p = document.getElementById("w-phone").value;
    const e = document.getElementById("w-email").value;
    if(!n || !p || !e) return alert("Nombre, Teléfono y Email son obligatorios");
    
    document.getElementById("loading").style.display = "flex";
    const payload = { ...WZ, name:n, phone:p, email:e, svcId: document.getElementById("w-svc").value, barber: document.getElementById("w-barber").value, notes: document.getElementById("w-notes").value };
    await api("addAppointment", payload);
    WZ.step = 4; render();
    document.getElementById("loading").style.display = "none";
}

async function renderAdmin(app) {
    if(!ADMIN_AUTH) {
        const p = prompt("Contraseña Barbería:");
        const res = await api("checkPass", {password: p});
        if(res.valid) { ADMIN_AUTH = true; render(); } else { switchView('client'); }
        return;
    }

    // PUNTO 5: GANANCIAS
    let total = 0; let hoy = 0; const tDay = new Date().toISOString().split('T')[0];
    DB.appointments.forEach(a => {
        if(a.status === "asistio") {
            const s = DB.services.find(x => x.id === a.svcId);
            if(s) total += parseFloat(s.price);
        }
        if(a.date === tDay) hoy++;
    });

    app.innerHTML = `<div class="stats-grid">
        <div class="stat-card"><h3>Ingresos</h3><h2 style="color:var(--green)">${total}${DB.config.currency || '€'}</h2></div>
        <div class="stat-card"><h3>Citas Hoy</h3><h2>${hoy}</h2></div>
    </div>
    <button class="btn" style="background:var(--bg3); color:var(--gold); border:1px solid var(--gold); margin-bottom:15px" onclick="loadData().then(render)">🔄 Actualizar Lista</button>
    <button class="btn" style="margin-bottom:20px" onclick="WZ={step:1,date:null,slot:null};switchView('client')">+ Nueva Cita Manual</button>`;

    const list = document.createElement("div");
    DB.appointments.slice().reverse().filter(a => a.status !== "eliminada").forEach(a => {
        const item = document.createElement("div"); item.className = "apt-card";
        const waMsg = encodeURIComponent(`Hola ${a.name}, confirmamos tu cita para el ${a.date} a las ${a.time}. ¡Te esperamos!`);
        item.innerHTML = `<div><b>${a.name}</b> (${a.barber})<br><small>${a.date} | ${a.time} - ${a.status}</small></div>
            <div class="apt-actions">
                <a href="https://wa.me/${a.phone.replace(/\D/g,'')}?text=${waMsg}" target="_blank" class="btn-sm btn-wa">WhatsApp</a>
                <a href="tel:${a.phone}" class="btn-sm btn-tel">Llamar</a>
                <button class="btn-sm" style="background:var(--green); color:black" onclick="updateStatus('${a.id}','asistio')">✓ Asistió</button>
                <button class="btn-sm" style="background:var(--red); color:white" onclick="updateStatus('${a.id}','eliminada')">🗑</button>
            </div>`;
        list.appendChild(item);
    });
    app.appendChild(list);
}

async function updateStatus(id, s) {
    if(!confirm("¿Actualizar estado?")) return;
    await api("updateStatus", {id, status: s});
    loadData().then(render);
}

window.onload = () => loadData().then(render);
</script>
</body>
</html>
